# Acceptance Tests — Audit Run 8 Re-verify
# Generated: 2026-05-10
# Pipeline: psg-audit-run8-reverify-2026-05-10

acceptance_tests:
  - test_name: test_no_assert_true_tautologies
    spec_ref: "QA1+QA2: No assert True tautologies in test files"
    input_description: "Scan all test files for assert True patterns"
    expected_behavior: "Zero matches for 'assert True' in tests/ (skipped tests excluded from assertion requirement)"
    edge_cases:
      - "Skipped tests with assert True are acceptable if unreachable"
      - "assert True as placeholder in actively-run tests is a CRITICAL finding"

  - test_name: test_output_validators_no_pii_logging
    spec_ref: "QA6: output_validators logs counts, not values"
    input_description: "Read output_validators.py and verify all logger calls use len() or count patterns, never raw PII"
    expected_behavior: "No logger.info/debug/warning calls that pass raw secrets, pii, or exfil lists as arguments"
    edge_cases:
      - "logger.debug may include sanitized references, never raw values"
      - "len(secrets) acceptable, secrets unacceptable"

  - test_name: test_sanitize_url_strips_userinfo
    spec_ref: "QA7: _sanitize_url strips userinfo from URLs before logging"
    input_description: "Test _sanitize_url with URLs containing userinfo"
    expected_behavior: "URLs like 'https://user:pass@host/path' become 'https://host/path'"
    edge_cases:
      - "URLs without userinfo remain unchanged"
      - "Empty userinfo (https://@host) stripped cleanly"
      - "Port numbers preserved after stripping userinfo"

  - test_name: test_all_changed_files_import
    spec_ref: "P3 entry gate: all changed files pass py_compile + import"
    input_description: "Import all 20 changed Python files"
    expected_behavior: "All imports succeed without error"
    edge_cases:
      - "Files with __main__ blocks should import cleanly"
      - "Files with side effects on import should use proper guards"

  - test_name: test_ruff_zero_errors_changed_files
    spec_ref: "P3 entry gate: ruff check passes on all changed files"
    input_description: "Run ruff check on all changed psg/ files"
    expected_behavior: "Zero errors on all changed files"
    edge_cases:
      - "Test-only files have separate ruff allowances"

  - test_name: test_full_suite_passes
    spec_ref: "P4: Full test suite must pass with zero failures"
    input_description: "Run pytest on full test suite"
    expected_behavior: "580+ pass, 0 fail, same or higher count than last-test-results.json"
    edge_cases:
      - "Skipped tests are tracked but not failures"
      - "Regressions flagged against baseline of 580 pass, 0 fail"

  - test_name: test_no_bare_except
    spec_ref: "Quality: no bare except clauses in psg/"
    input_description: "Grep for bare except: patterns in psg/"
    expected_behavior: "Zero bare except clauses found"
    edge_cases:
      - "except Exception: is acceptable (specific exception type)"
      - "except: is NOT acceptable (bare except)"

  - test_name: test_no_hardcoded_secrets
    spec_ref: "Security: no hardcoded API keys, tokens, or passwords in psg/"
    input_description: "Grep for hardcoded credential patterns"
    expected_behavior: "No hardcoded secrets found — all credentials passed via config/args"
    edge_cases:
      - "Variable names containing 'api_key' are OK if assigned from config"
      - "String literals containing actual key values are CRITICAL findings"