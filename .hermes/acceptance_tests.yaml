# PSG Audit v4.4.0 — Acceptance Tests
# Generated by: P1 Plan phase (audit 2026-05-09)

tests:
  - test_name: test_no_swallowed_exceptions_without_logging
    spec_ref: "SPEC: Every except Exception block must either re-raise, log, or explicitly acknowledge as acceptable"
    input_description: "All except Exception blocks in psg/ source code"
    expected_behavior: "No except Exception block silently swallows errors. Each must: (a) re-raise, (b) log with logger, or (c) have a comment explaining why it's acceptable"
    edge_cases:
      - "Checkpoint fallbacks with logger.exception are acceptable"
      - "ML classifier graceful degradation with logging.warning is acceptable"

  - test_name: test_all_tests_have_assertions
    spec_ref: "SPEC: Every test function must have at least one assertion"
    input_description: "All test functions in tests/ directory"
    expected_behavior: "Zero test functions without any assert statement, assertXxx call, or pytest.raises"
    edge_cases:
      - "Integration tests that verify 'doesn't crash' must assert on return type or side effect"

  - test_name: test_core_modules_have_logging
    spec_ref: "SPEC: Core modules (serve, cli, execution, security, automation) must use logging module"
    input_description: "psg/serve.py, psg/cli.py, psg/execution/*.py, psg/security/*.py, psg/automation/*.py"
    expected_behavior: "Each module has logger = logging.getLogger(__name__) and uses it for errors/warnings"
    edge_cases:
      - "__init__.py files are exempt"
      - "models.py (data classes only) is exempt"

  - test_name: test_no_ruff_regression
    spec_ref: "SPEC: ruff check psg/ tests/ must pass with 0 errors"
    input_description: "Full codebase after all changes"
    expected_behavior: "ruff check returns 0 errors"
    edge_cases:
      - "No ruff rule exceptions added without justification"

  - test_name: test_all_existing_tests_still_pass
    spec_ref: "SPEC: All 580+ existing tests must pass after changes"
    input_description: "Full test suite after audit changes"
    expected_behavior: "pytest reports 580+ pass, 0 fail"
    edge_cases:
      - "New assertions on previously assertionless tests may change behavior — verify carefully"

  - test_name: test_type_annotations_no_regression
    spec_ref: "SPEC: Type annotation coverage must not decrease from 94%"
    input_description: "All public functions in modified files"
    expected_behavior: "No public function loses type annotations; new annotations added where missing"
    edge_cases:
      - "Private functions (_prefix) are exempt from annotation requirements"

  - test_name: test_exception_narrowing_preserves_behavior
    spec_ref: "SPEC: Narrowing exception types must not change error handling behavior"
    input_description: "All modified except blocks"
    expected_behavior: "Tests that previously relied on broad Exception catching still pass"
    edge_cases:
      - "If a broad catch was intentional (e.g., ML model fallback), narrowing to specific types may break graceful degradation"