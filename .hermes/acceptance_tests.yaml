# PSG v3.1 Pipeline Acceptance Tests — Slop & Bloat Cleanup
# Generated by: P1 Plan phase
# Spec references: PSG codebase quality standards

tests:
  - test_name: test_no_redundant_docstrings
    spec_ref: "SPEC: Redundant docstrings that just restate function names must be removed"
    input_description: "Functions with docstrings that merely rephrase the function name in sentence form"
    expected_behavior: "Redundant 1-line docstrings replaced with brief one-liners or removed; semantic docstrings kept"
    edge_cases:
      - "Functions with no docstring at all (should stay)"
      - "Functions with genuinely useful multi-line docstrings (must be kept)"

  - test_name: test_classifier_under_800_lines
    spec_ref: "SPEC: classifier.py must not exceed 800 lines after cleanup"
    input_description: "Current 905-line classifier.py"
    expected_behavior: "classifier.py reduced to ≤800 lines by removing redundant comments and condensing pattern lists"
    edge_cases:
      - "All pattern strings must remain functionally identical"
      - "All test cases must still pass"

  - test_name: test_no_ai_voice_patterns
    spec_ref: "SPEC: No AI filler phrases in code comments or docstrings"
    input_description: "Codebase scanned for 'It is important to note', 'It should be noted', 'Please note', 'in order to'"
    expected_behavior: "Zero matches for AI filler patterns in psg/ source code"
    edge_cases:
      - "Legitimate uses in user-facing documentation (README, CONTRIBUTING) are allowed"

  - test_name: test_validate_url_docstring_trimmed
    spec_ref: "SPEC: validate_url docstring must be ≤8 lines (was 16)"
    input_description: "psg/automation/validation.py validate_url has 16-line docstring"
    expected_behavior: "Docstring trimmed to essential content, ToCTOU warning kept as brief note"
    edge_cases:
      - "Security warning about TOCTOU must not be removed"

  - test_name: test_all_tests_pass_after_cleanup
    spec_ref: "SPEC: All 581 existing tests must pass after slop removal"
    input_description: "Full test suite after all docstring/comment/structural changes"
    expected_behavior: "pytest reports 580+ pass, 0 fail, 0 errors"
    edge_cases:
      - "Test files themselves should NOT have their docstrings removed (they document test intent)"

  - test_name: test_ruff_clean_after_cleanup
    spec_ref: "SPEC: ruff check psg/ tests/ must pass with 0 errors after changes"
    input_description: "ruff check after all modifications"
    expected_behavior: "All checks passed!"
    edge_cases:
      - "No new lint errors from deleted docstrings leaving bare functions"

  - test_name: test_no_regression_line_count
    spec_ref: "SPEC: Total psg/ line count must decrease by ≥100 lines from baseline 10451"
    input_description: "Line count after all cleanup changes"
    expected_behavior: "find psg/ -name '*.py' -exec cat {} + | wc -l ≤ 10351"
    edge_cases:
      - "Line count must not increase (proves actual removal, not restructuring)"

  - test_name: test_serve_pydantic_docstrings_intact
    spec_ref: "SPEC: FastAPI/Pydantic model docstrings must be preserved (they generate OpenAPI docs)"
    input_description: "serve.py endpoint and model docstrings"
    expected_behavior: "All Pydantic model and FastAPI endpoint docstrings remain unchanged"
    edge_cases:
      - "CLI argument help strings are separate from docstrings and can be trimmed if redundant"