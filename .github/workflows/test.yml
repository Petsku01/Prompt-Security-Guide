name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests/test_psg_*.py

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check psg/ tests/

      - name: Type check with mypy
        run: |
          pip install mypy types-requests
          mypy psg/ --ignore-missing-imports

      - name: Evaluate classifier
        run: |
          python -m psg.security.evaluate --golden datasets/classifier_golden.json --out /tmp/classifier_eval.json
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path('/tmp/classifier_eval.json').read_text(encoding='utf-8'))
          macro_f1 = float(report.get('macro_f1', 0.0))
          print(f"macro_f1={macro_f1:.3f}")
          if macro_f1 < 0.85:
              raise SystemExit(f"Classifier macro F1 below threshold: {macro_f1:.3f} < 0.85")
          PY
