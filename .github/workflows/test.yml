name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests/test_psg_*.py

      - name: CLI smoke test
        run: |
          python -m psg --help
          python -m psg catalog validate --path datasets/obliteratus_attacks.json

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check psg/ tests/

      - name: Type check with mypy
        run: |
          pip install mypy types-requests
          mypy psg/ --ignore-missing-imports

      - name: Evaluate classifier (regression gate)
        run: |
          python -m psg eval --golden datasets/classifier_golden.json --fail-on-macro-f1-below 0.85
